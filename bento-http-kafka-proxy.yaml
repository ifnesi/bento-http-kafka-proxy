http:
  address: ${HTTP_PROXY_HOST:0.0.0.0}:${HTTP_PROXY_PORT:4195}
  enabled: true
  root_path: /bento
  debug_endpoints: false

logger:
  level: ${LOG_LEVEL:INFO}
  format: json
  add_timestamp: true
  static_fields:
    '@service': bento-http-kafka-proxy

metrics:
  prometheus: {}

input:
  http_server:
    path: /topics/{topic}
    allowed_verbs:
      - POST
    timeout: 30s
    sync_response:
      status: '${! metadata("mt_bento_http_status").or("200") }'
      headers:
        Content-Type: 'application/vnd.kafka.v2+json'

pipeline:
  processors:
    # Validate content-type and extract topic
    - mapping: |
        # Extract topic from path parameter
        let vr_bento_topic = metadata("topic").or("")
        root = if $vr_bento_topic == "" {
          throw("topic missing from path")
        }
        meta mt_bento_topic = $vr_bento_topic

        # Check the content-type
        let vr_bento_ct = metadata("content-type").or(metadata("Content-Type")).or(metadata("http_server_request_content_type")).or("").lowercase()

        # Determine content type for processing and encoding - default to JSON if not specified
        let vr_bento_content_type = if $vr_bento_ct == "application/vnd.kafka.avro.v2+json" {
          "avro"
        } else if $vr_bento_ct == "application/vnd.kafka.binary.v2+json" {
          "binary_b64"
        } else if $vr_bento_ct == "application/vnd.kafka.json.v2+json" || $vr_bento_ct == "application/json" {
          "json"
        } else if $vr_bento_ct != "" {
          throw("unsupported content type: " + $vr_bento_ct)
        } else {
          "json"
        }
        meta mt_bento_content_type = $vr_bento_content_type

        # Compute schema subject
        let vr_bento_x_schema = metadata("x-schema-subject").or(metadata("X-Schema-Subject")).or("")
        let vr_bento_schema_subject = if $vr_bento_x_schema != "" {
          $vr_bento_x_schema
        } else {
          $vr_bento_topic + "-value"
        }
        meta mt_bento_schema_subject = $vr_bento_schema_subject

        root = content().parse_json()

    - catch:
        # HTTP respond with appropriate error code based on the error message
        - mapping: |
            let vr_bento_err_msg = error().or("parsing error")
            let vr_bento_err_lower = $vr_bento_err_msg.lowercase()

            let vr_bento_status = if $vr_bento_err_lower.contains("unsupported content") || $vr_bento_err_lower.contains("content type") {
              "415"
            } else if $vr_bento_err_lower.contains("json") || $vr_bento_err_lower.contains("eof") || $vr_bento_err_lower.contains("parse") {
              "400"
            } else if $vr_bento_err_lower.contains("topic") || $vr_bento_err_lower.contains("path") {
              "400"
            } else {
              "500"
            }

            meta mt_bento_http_status = $vr_bento_status

            root = {
              "error_code": $vr_bento_status.number(),
              "message": $vr_bento_err_msg
            }
        - sync_response: {}
        - mapping: |
            root = deleted()

    # Validate and transform records
    - mapping: |
        root = if this.records == null || this.records.type() != "array" {
          throw("payload must contain records array")
        }

        root = if this.records.length() == 0 {
          throw("records array cannot be empty")
        }

        root = if this.records.length() > 10000 {
          throw("too many records - max 10000")
        }

        let vr_bento_content_type = metadata("mt_bento_content_type")
        root = this.records.map_each(record -> {
          "key": record.key.or(null),
          "value": if record.value == null {
            throw("record value cannot be null")
            } else {
              # Base64 decode if binary, otherwise pass through (could be JSON or AVRO - schema registry encode will handle AVRO encoding later)
            if $vr_bento_content_type == "binary_b64" {
              record.value.decode("base64").string()
            } else {
              record.value
            }
          },
          "partition": if record.partition != null {
            record.partition.string()
          } else {
            ""
          },
          "headers": if record.headers != null && record.headers.type() == "array" {
            record.headers
          } else {
            []
          }
        })

    - catch:
        # HTTP respond with appropriate error code based on the error message
        - mapping: |
            let vr_bento_err_msg = error().or("validation error")
            let vr_bento_err_lower = $vr_bento_err_msg.lowercase()

            let vr_bento_status = if $vr_bento_err_lower.contains("records") || $vr_bento_err_lower.contains("array") ||
                          $vr_bento_err_lower.contains("empty") || $vr_bento_err_lower.contains("missing") ||
                          $vr_bento_err_lower.contains("too many") || $vr_bento_err_lower.contains("value cannot be null") {
              "400"
            } else {
              "500"
            }

            meta mt_bento_http_status = $vr_bento_status

            root = {
              "error_code": $vr_bento_status.number(),
              "message": $vr_bento_err_msg
            }
        - sync_response: {}
        - mapping: |
            root = deleted()

    # Build HTTP response and save records for later
    - mapping: |
        # Save records array for Kafka processing
        meta mt_bento_saved_records = this.format_json()

        # Build HTTP response
        let vr_bento_content_type = metadata("mt_bento_content_type")
        root = {
          "key_schema_id": null,
          "value_schema_id": if $vr_bento_content_type == "avro" { 1 } else { null },
          "offsets": [{
            "partition": -1,
            "offset": -1,
            "error_code": null,
            "error": null
          }]
        }

    # Send response
    - sync_response: {}

    # Restore records for Kafka processing
    - mapping: |
        # Save metadata that needs to persist
        let vr_bento_topic = metadata("mt_bento_topic")
        let vr_bento_content_type = metadata("mt_bento_content_type")
        let vr_bento_schema_subject = metadata("mt_bento_schema_subject")

        # Restore records
        root = metadata("mt_bento_saved_records").parse_json()

        # Restore metadata (parse_json might clear it)
        meta mt_bento_topic = $vr_bento_topic
        meta mt_bento_content_type = $vr_bento_content_type
        meta mt_bento_schema_subject = $vr_bento_schema_subject

    # Store metadata values before unarchive (they don't survive unarchive)
    - mapping: |
        let vr_bento_topic = metadata("mt_bento_topic")
        meta mt_bento_stored_topic = $vr_bento_topic

        let vr_bento_content_type = metadata("mt_bento_content_type")
        meta mt_bento_stored_content_type = $vr_bento_content_type

        # Store schema_subject - for AVRO messages, validate it's not empty
        let vr_bento_subject = metadata("mt_bento_schema_subject")
        meta mt_bento_stored_schema_subject = if $vr_bento_content_type == "avro" && ($vr_bento_subject == null || $vr_bento_subject == "") {
          throw("AVRO message missing schema_subject")
        } else if $vr_bento_subject != null && $vr_bento_subject != "" {
          $vr_bento_subject
        } else {
          ""
        }

        root = this

    # Split records for Kafka
    - unarchive:
        format: json_array

    # Extract metadata for each record
    - mapping: |
        meta mt_bento_kafka_topic = metadata("mt_bento_stored_topic")
        meta mt_bento_kafka_key = if this.key != null { this.key.string() } else { deleted() }

        # Set partition metadata only if explicitly specified
        let vr_bento_part_val = this.partition
        let vr_bento_has_part = $vr_bento_part_val != null && $vr_bento_part_val != ""
        meta mt_bento_has_partition = if $vr_bento_has_part { "true" } else { "false" }
        meta mt_bento_kafka_partition = if $vr_bento_has_part { $vr_bento_part_val.number() } else { deleted() }

        # Restore metadata lost in unarchive
        let vr_bento_content_type = metadata("mt_bento_stored_content_type")
        meta mt_bento_content_type = $vr_bento_content_type

        let vr_bento_stored_subject = metadata("mt_bento_stored_schema_subject")
        meta mt_bento_schema_subject = if $vr_bento_stored_subject != null && $vr_bento_stored_subject != "" {
          $vr_bento_stored_subject
        } else {
          ""
        }

        # Store headers from Confluent REST Proxy format as Kafka header
        # Confluent REST Proxy format: [{"name": "Header-1", "value": "Value-1"}, ...]
        # Store as Kafka header with key="headers" and value=compact JSON (no newlines)
        meta headers = if this.headers != null && this.headers.length() > 0 {
          this.headers.string()
        } else {
          deleted()
        }

        # Set the root to the record value for further processing
        root = this.value

    # AVRO encoding if spcified via content-type and/or schema registry subject
    - switch:
        - check: 'metadata("mt_bento_content_type") == "avro"'
          processors:
            - schema_registry_encode:
                url: ${SCHEMA_REGISTRY_URL}
                subject: '${! metadata("mt_bento_schema_subject") }'
                refresh_period: 10m
                avro_raw_json: true
                basic_auth:
                  enabled: true
                  username: ${SCHEMA_REGISTRY_USERNAME}
                  password: ${SCHEMA_REGISTRY_PASSWORD}
            - catch:
                - log:
                    level: ERROR
                    message: 'AVRO encoding FAILED - dropping message: ${! error() }'
                - mapping: 'root = deleted()'
        - check: 'metadata("mt_bento_content_type") == "json"'
          processors:
            - noop: {}
        - check: 'metadata("mt_bento_content_type") == "binary_b64"'
          processors:
            - noop: {}

output:
  fallback:
    - broker:
        pattern: fan_out
        outputs:
          - switch:
              cases:
                # Use manual partitioner when partition is explicitly set
                - check: 'metadata("mt_bento_has_partition") == "true"'
                  output:
                    kafka_franz:
                      seed_brokers:
                        - ${KAFKA_BROKERS}
                      topic: '${! metadata("mt_bento_kafka_topic") }'
                      client_id: ${KAFKA_CLIENT_ID:"bento-http-kafka-proxy"}
                      key: '${! metadata("mt_bento_kafka_key").or("") }'
                      partitioner: manual
                      partition: '${! metadata("mt_bento_kafka_partition") }'
                      metadata:
                        include_prefixes: ["headers"]
                      compression: ${KAFKA_COMPRESSION:snappy}
                      max_in_flight: ${KAFKA_MAX_IN_FLIGHT:10}
                      batching:
                        count: ${KAFKA_BATCH_COUNT:100}
                        byte_size: ${KAFKA_BATCH_SIZE:1000000}
                        period: ${KAFKA_BATCH_PERIOD:100ms}
                      timeout: 30s
                      tls:
                        enabled: ${KAFKA_TLS_ENABLED:true}
                      sasl:
                        - mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
                          username: ${KAFKA_USERNAME}
                          password: ${KAFKA_PASSWORD}
                # Use hash-based partitioner when partition not specified
                - check: 'true'
                  output:
                    kafka_franz:
                      seed_brokers:
                        - ${KAFKA_BROKERS}
                      topic: '${! metadata("mt_bento_kafka_topic") }'
                      client_id: ${KAFKA_CLIENT_ID:"bento-http-kafka-proxy"}
                      key: '${! metadata("mt_bento_kafka_key").or("") }'
                      partitioner: murmur2_hash
                      metadata:
                        include_prefixes: ["headers"]
                      compression: ${KAFKA_COMPRESSION:snappy}
                      max_in_flight: ${KAFKA_MAX_IN_FLIGHT:10}
                      batching:
                        count: ${KAFKA_BATCH_COUNT:100}
                        byte_size: ${KAFKA_BATCH_SIZE:1000000}
                        period: ${KAFKA_BATCH_PERIOD:100ms}
                      timeout: 30s
                      tls:
                        enabled: ${KAFKA_TLS_ENABLED:true}
                      sasl:
                        - mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
                          username: ${KAFKA_USERNAME}
                          password: ${KAFKA_PASSWORD}

    # Error response fallback
    - drop: {}
      processors:
        - mapping: |
            let vr_bento_msg = error().or("internal server error")
            let vr_bento_err_lower = $vr_bento_msg.lowercase()

            let vr_bento_status = if $vr_bento_err_lower.contains("unsupported content") || $vr_bento_err_lower.contains("content type") {
              "415"
            } else if $vr_bento_err_lower.contains("records") || $vr_bento_err_lower.contains("array") ||
                      $vr_bento_err_lower.contains("empty") || $vr_bento_err_lower.contains("missing") ||
                      $vr_bento_err_lower.contains("too many") {
              "400"
            } else if $vr_bento_err_lower.contains("schema") || $vr_bento_err_lower.contains("avro") ||
                      $vr_bento_err_lower.contains("encoding") {
              "422"
            } else if $vr_bento_err_lower.contains("auth") || $vr_bento_err_lower.contains("unauthorized") {
              "401"
            } else if $vr_bento_err_lower.contains("timeout") {
              "504"
            } else {
              "500"
            }

            meta mt_bento_http_status = $vr_bento_status

            root = {
              "error_code": $vr_bento_status.number(),
              "message": $vr_bento_msg
            }

        - sync_response: {}
