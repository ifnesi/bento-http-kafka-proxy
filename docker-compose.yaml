services:
  bento-http-kafka-proxy:
    image: ghcr.io/warpstreamlabs/bento:latest
    container_name: bento-http-kafka-proxy
    restart: unless-stopped
    ports:
      - "${HTTP_PROXY_PORT:-4195}:${HTTP_PROXY_PORT:-4195}"
    volumes:
      - ./bento-http-kafka-proxy.yaml:/bento.yaml:ro
    environment:
      # HTTP Server
      HTTP_PROXY_HOST: ${HTTP_PROXY_HOST:-0.0.0.0}
      HTTP_PROXY_PORT: ${HTTP_PROXY_PORT:-4195}

      # Kafka
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      KAFKA_TLS_ENABLED: ${KAFKA_TLS_ENABLED:-true}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-PLAIN}
      KAFKA_USERNAME: ${KAFKA_API_KEY}
      KAFKA_PASSWORD: ${KAFKA_API_SECRET}

      # Schema Registry
      SCHEMA_REGISTRY_URL: ${SCHEMA_REGISTRY_URL}
      SCHEMA_REGISTRY_USERNAME: ${SCHEMA_REGISTRY_USERNAME:-}
      SCHEMA_REGISTRY_PASSWORD: ${SCHEMA_REGISTRY_PASSWORD:-}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # Performance Tuning
      KAFKA_MAX_IN_FLIGHT: ${KAFKA_MAX_IN_FLIGHT:-10}
      KAFKA_BATCH_COUNT: ${KAFKA_BATCH_COUNT:-100}
      KAFKA_BATCH_SIZE: ${KAFKA_BATCH_SIZE:-1000000}
      KAFKA_BATCH_PERIOD: ${KAFKA_BATCH_PERIOD:-100ms}
      KAFKA_COMPRESSION: ${KAFKA_COMPRESSION:-snappy}

    command: ["-c", "/bento.yaml"]

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${HTTP_PROXY_PORT:-4195}/bento/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
